          title: Archived At
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          description: RFC 3339 datetime string representing the time at which the Message Batch was archived and its results became unavailable.
        cancel_initiated_at:
          examples:
            - '2024-08-20T18:37:24.100435Z'
