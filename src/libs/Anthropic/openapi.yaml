    CountMessageTokensParams:
      examples:
        - messages:
            - content: 'Hello, world'
              role: user
          model: claude-opus-4-6
      title: CountMessageTokensParams
      required:
        - messages
        - model
      type: object
      properties:
        cache_control:
          title: Cache Control
          anyOf:
            - oneOf:
                - $ref: '#/components/schemas/CacheControlEphemeral'
              discriminator:
                propertyName: type
                mapping:
