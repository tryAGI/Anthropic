components:
  schemas:
    APIError:
      title: APIError
      required:
        - message
        - type
      type: object
      properties:
        message:
          title: Message
          type: string
          default: Internal server error
        type:
          const: api_error
          title: Type
          type: string
          default: api_error
    AuthenticationError:
      title: AuthenticationError
      required:
        - message
        - type
      type: object
      properties:
        message:
          title: Message
          type: string
          default: Authentication error
        type:
          const: authentication_error
          title: Type
          type: string
          default: authentication_error
    Base64ImageSource:
      title: Base64ImageSource
      required:
        - data
        - media_type
        - type
      type: object
      properties:
        data:
          title: Data
          type: string
          format: byte
        media_type:
          title: Media Type
          enum:
            - image/jpeg
            - image/png
            - image/gif
            - image/webp
          type: string
        type:
          const: base64
          title: Type
          type: string
      additionalProperties: false
    Base64PDFSource:
